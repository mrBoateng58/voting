<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="../images/WhatsApp Image 2025-11-27 at 18.02.26_d8b4db31.jpg">
    <title>Thank You - Regent Voting System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/student.css">
</head>
<body>
    <div class="student-shell">
        <div class="container">
            <section class="student-card thank-you-section">
                <div class="thank-you-content">
                    <div class="thank-you-icon">
                        <i class="fa-solid fa-check-circle"></i>
                    </div>
                    <h1>Thank You!</h1>
                    <p class="thank-you-message">Your vote has been successfully recorded.</p>
                    <p class="thank-you-subtitle">We appreciate your participation in this election.</p>
                </div>

                <div class="thank-you-actions">
                    <a href="dashboard.html" class="btn">
                        <i class="fa-solid fa-house"></i> Return to Dashboard
                    </a>
                    <button id="logout" type="button" class="btn-danger">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../supabase-config.js';

        const logoutBtn = document.getElementById('logout');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                try {
                    await supabase.auth.signOut();
                    window.location.href = '../index.html';
                } catch (error) {
                    console.error('Error logging out:', error);
                    window.location.href = '../index.html';
                }
            });
        }
    </script>
</body>
</html>
