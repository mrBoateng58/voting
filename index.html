<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="images/WhatsApp Image 2025-11-27 at 18.02.26_d8b4db31.jpg">
    <title>Regent Voting System - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-shell">
        <div class="container">
        <div class="login-form">
            <div class="login-logo">
                <img src="images/WhatsApp Image 2025-11-27 at 18.02.26_d8b4db31.jpg" alt="Regent University">
            </div>
            <h2><i class="fa-solid fa-user-graduate"></i> Student Login</h2>
            <p class="login-subtitle">Sign in with your school email, student ID, and election access code.</p>
            <form id="login-form" method="post" action="javascript:void(0);">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" name="student-id" autocomplete="off" required>
                </div>
                <div class="form-group" id="access-code-group">
                    <label for="access-code">Access Code</label>
                    <input type="password" id="access-code" name="access-code" autocomplete="one-time-code" placeholder="Enter your access code" required>
                </div>
                <button type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
            </form>
            <p id="error-message" class="error-message"></p>
        </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
