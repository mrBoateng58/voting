# Nginx hardening for admin panel on separate host/path.
# Example host split:
#   students: app.example.com
#   admins:  admin.example.com
#
# This config adds:
# - IP allowlist
# - HTTP Basic Auth
# - Rate limiting on admin login
# - Optional path remap /secure-admin/ -> /admin/

limit_req_zone $binary_remote_addr zone=admin_login_limit:10m rate=5r/m;

server {
    listen 443 ssl http2;
    server_name admin.example.com;

    # SSL directives omitted for brevity.
    # ssl_certificate ...;
    # ssl_certificate_key ...;

    root /var/www/voting;
    index index.html;

    # Optional: hide direct /admin path and force secure path.
    location ^~ /admin/ {
        return 404;
    }

    # Protected admin path.
    location ^~ /secure-admin/ {
        # IP allowlist (replace with your real office/VPN CIDRs)
        allow 203.0.113.0/24;
        allow 198.51.100.10/32;
        deny all;

        # Additional credential wall before app-level auth
        auth_basic "Restricted Admin Area";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;

        # Rate-limit all admin requests
        limit_req zone=admin_login_limit burst=10 nodelay;

        # Map /secure-admin/* to static /admin/* files
        rewrite ^/secure-admin/(.*)$ /admin/$1 break;
        try_files $uri $uri/ =404;

        add_header Cache-Control "no-store" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # Student/public app
    location / {
        try_files $uri $uri/ /index.html;
    }
}
